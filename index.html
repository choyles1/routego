function setStatus(msg, isErr) { setSyncStatus(msg); setSyncError(!!isErr); }

async function pushCloud(locs, key, bid) {
if (!key) return bid;
try {
if (!bid) {
const res = await fetch(JSONBIN_BASE+’/b’, {
method:‘POST’,
headers:{‘Content-Type’:‘application/json’,‘X-Master-Key’:key,‘X-Bin-Name’:‘RouteGO’},
body: JSON.stringify({locations:locs})
});
if (!res.ok) throw new Error(res.status);
const data = await res.json();
const nb = data.metadata.id;
localStorage.setItem(‘rg_binid’, nb);
setBinId(nb);
setStatus(‘Bin ID: ’ + nb + ’ (use on 2nd phone)’);
return nb;
} else {
const res2 = await fetch(JSONBIN_BASE+’/b/’+bid, {
method:‘PUT’,
headers:{‘Content-Type’:‘application/json’,‘X-Master-Key’:key},
body: JSON.stringify({locations:locs})
});
if (!res2.ok) throw new Error(res2.status);
setStatus(’Synced ’ + fmtTime(new Date()));
return bid;
}
} catch(e) { setStatus(‘Sync failed — check API key’, true); return bid; }
}

async function pullCloud(key, bid, silent) {
if (!key || !bid) return false;
setSyncing(true);
try {
const res = await fetch(JSONBIN_BASE+’/b/’+bid+’/latest’, {headers:{‘X-Master-Key’:key}});
if (!res.ok) throw new Error(res.status);
const data = await res.json();
const remote = data.record.locations || [];
setLocations(remote);
localStorage.setItem(‘rg_locations’, JSON.stringify(remote));
setStatus(’Synced ’ + fmtTime(new Date()));
if (!silent) showToast(‘Locations synced’);
return true;
} catch(e) {
setStatus(‘Sync failed — check API key’, true);
if (!silent) showToast(‘Sync failed’, ‘error’);
return false;
} finally { setSyncing(false); }
}

useEffect(function(){
if (apiKey && binId) pullCloud(apiKey, binId, true);
else if (!apiKey) setStatus(‘Not connected — enter API key above’);
function hide() { setToast(function(t){ return Object.assign({},t,{visible:false}); }); }
window.addEventListener(‘focus’, hide);
document.addEventListener(‘visibilitychange’, function(){ if (document.visibilityState===‘visible’) hide(); });
return function(){ window.removeEventListener(‘focus’, hide); };
}, []);

async function saveAndSync(newLocs) {
setLocations(newLocs);
localStorage.setItem(‘rg_locations’, JSON.stringify(newLocs));
await pushCloud(newLocs, apiKey, binId);
}

async function handleConnect() {
const key = apiKeyInput.trim();
if (!key) { showToast(‘Please enter an API key’, ‘error’); return; }
localStorage.setItem(‘rg_apikey’, key); setApiKey(key);
const nb = binIdInput.trim();
if (nb) { localStorage.setItem(‘rg_binid’, nb); setBinId(nb); }
showToast(‘Connecting…’);
const pulled = await pullCloud(key, nb||binId, true);
if (!pulled) await pushCloud(locations, key, nb||binId);
}

function handleReset() {
if (!confirm(‘Reset sync credentials? Your cloud data is NOT deleted.’)) return;
setApiKey(’’); setBinId(’’);
localStorage.removeItem(‘rg_apikey’); localStorage.removeItem(‘rg_binid’);
setStatus(‘Not connected — enter API key above’);
showToast(‘Credentials cleared’);
}

async function addLocation() {
if (!newData.name.trim() || !newData.address.trim()) { showToast(‘Name and address required’,‘error’); return; }
const loc = Object.assign({}, newData, {id:Date.now().toString(), visitCount:0, lastVisit:null});
await saveAndSync(locations.concat([loc]));
setNewData(Object.assign({}, BLANK));
showToast(loc.name + ’ added!’);
}

async function deleteLocation(id) {
if (!confirm(‘Remove this location?’)) return;
setSelected(function(s){ const ns=new Set(s); ns.delete(id); return ns; });
await saveAndSync(locations.filter(function(l){ return l.id !== id; }));
showToast(‘Location removed’);
}

function buildAndLaunch(lat, lng) {
const stops = locations.filter(function(l){ return selected.has(l.id); });
const encoded = stops.map(function(l){ return encodeURIComponent(l.address); });
let allStops;
if (startAddr) allStops = [encodeURIComponent(startAddr)].concat(encoded);
else if (lat && lng) allStops = [lat+’,’+lng].concat(encoded);
else allStops = encoded.slice();
window.location.href = ‘googlechrome://maps.google.com/maps/dir/’ + allStops.join(’/’);
showToast(‘Opening ’ + stops.length + ’ stop’ + (stops.length>1?‘s’:’’) + ’ in Maps’);
if (stops.length > 1) setShowTip(true);
}

function launchRoute() {
const stops = locations.filter(function(l){ return selected.has(l.id); });
if (stops.length === 0) return;
if (!startAddr && navigator.geolocation) {
showToast(‘Getting your location…’);
navigator.geolocation.getCurrentPosition(
function(pos){ buildAndLaunch(pos.coords.latitude, pos.coords.longitude); },
function(){ buildAndLaunch(null, null); },
{timeout:5000, maximumAge:30000}
);
} else {
buildAndLaunch(null, null);
}
}
