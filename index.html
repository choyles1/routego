<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>RouteGO</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="RouteGO">
<link rel="apple-touch-icon" id="appIcon" href="">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#ffffff; --surface:#f4f6fb; --surface2:#e8ecf5; --border:#a8b4cc;
    --accent:#e8590c; --accent2:#f97316; --text:#0f1220; --muted:#3d4966;
    --green:#16a34a; --red:#dc2626; --gold:#d97706; --radius:12px;
  }
  * { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
  body { background:var(--bg); color:var(--text); font-family:'Syne',sans-serif; min-height:100vh; max-width:480px; margin:0 auto; padding-bottom:80px; }
  input,select,button { font-family:'Syne',sans-serif; }
  .header { padding:18px 20px 12px; border-bottom:2px solid #c0c8dc; position:sticky; top:0; background:#fff; z-index:100; box-shadow:0 2px 12px rgba(0,0,0,0.10); }
  .header-top { display:flex; align-items:center; justify-content:space-between; margin-bottom:2px; }
  .app-title { font-size:22px; font-weight:800; letter-spacing:-0.5px; }
  .app-title span { color:var(--accent); }
  .header-right { display:flex; align-items:center; gap:6px; }
  .date-badge { font-family:'DM Mono',monospace; font-size:11px; color:var(--muted); background:var(--surface); padding:4px 10px; border-radius:20px; border:1px solid var(--border); }
  .sync-btn { background:#1a2040; border:none; border-radius:20px; padding:5px 12px; font-size:11px; font-weight:700; color:#fff; cursor:pointer; display:flex; align-items:center; gap:4px; transition:all 0.15s; }
  .sync-btn:hover, .sync-btn.syncing { background:var(--accent); }
  .spin { display:inline-block; }
  .spin.active { animation:spin 0.8s linear infinite; }
  @keyframes spin { to { transform:rotate(360deg); } }
  .reset-btn { background:#1a2040; border:none; border-radius:20px; padding:5px 9px; font-size:13px; cursor:pointer; color:#fff; transition:all 0.15s; }
  .reset-btn:hover { background:var(--accent); }
  .sync-status { font-size:10px; color:var(--muted); font-family:'DM Mono',monospace; margin-top:2px; }
  .sync-status.error { color:var(--red); }
  .tabs { display:flex; gap:6px; padding:12px 20px; border-bottom:2px solid #c0c8dc; background:#fff; }
  .tab { flex:1; padding:10px 8px; border-radius:8px; border:none; background:#1a2040; color:#fff; font-size:13px; font-weight:800; cursor:pointer; transition:all 0.15s; }
  .tab.active { background:#e8590c; }
  .panel { padding:14px 20px; }
  .setup-banner { background:#fff8f0; border:1px solid #fbbf99; border-radius:var(--radius); padding:14px 16px; margin-bottom:14px; }
  .setup-banner-title { font-size:13px; font-weight:700; color:var(--accent); margin-bottom:4px; }
  .setup-banner-sub { font-size:12px; color:#92400e; line-height:1.5; margin-bottom:10px; }
  .setup-row { display:flex; gap:8px; margin-bottom:8px; }
  .setup-input { flex:1; background:#fff; border:1px solid var(--border); border-radius:8px; padding:8px 12px; font-family:'DM Mono',monospace; font-size:12px; color:var(--text); outline:none; }
  .setup-input:focus { border-color:var(--accent); }
  .setup-save-btn { padding:8px 14px; background:var(--accent); color:#fff; border:none; border-radius:8px; font-size:12px; font-weight:700; cursor:pointer; white-space:nowrap; }
  .route-summary { background:#f0f4ff; border-radius:var(--radius); padding:14px 16px; margin-bottom:12px; border:2px solid var(--border); display:flex; align-items:center; justify-content:space-between; }
  .route-summary-label { font-size:12px; color:var(--muted); margin-bottom:2px; }
  .route-summary-count { font-size:24px; font-weight:800; color:var(--accent); font-family:'DM Mono',monospace; }
  .route-summary-count span { font-size:14px; color:var(--muted); font-weight:400; }
  .start-right { text-align:right; }
  .start-right-label { font-size:12px; color:var(--muted); margin-bottom:2px; }
  .start-right-val { font-size:13px; color:var(--accent); font-weight:700; }
  .start-row { margin-bottom:10px; }
  .field-label { font-size:11px; font-weight:600; color:var(--muted); text-transform:uppercase; letter-spacing:1px; margin-bottom:5px; }
  .text-input, .search-input, .form-input { width:100%; background:#fff; border:2px solid var(--border); border-radius:8px; padding:10px 14px; color:var(--text); font-family:'DM Mono',monospace; font-size:13px; outline:none; transition:border 0.15s; }
  .text-input:focus, .search-input:focus, .form-input:focus { border-color:var(--accent); }
  .text-input::placeholder, .search-input::placeholder, .form-input::placeholder { color:#8090a8; }
  .search-input { margin-bottom:10px; }
  .select-actions { display:flex; gap:6px; margin-bottom:10px; }
  .select-btn { flex:1; padding:8px 4px; background:#1a2040; border:none; border-radius:8px; color:#fff; font-size:11px; font-weight:700; cursor:pointer; transition:all 0.15s; }
  .select-btn:hover { background:var(--accent); }
  .stop-list { display:flex; flex-direction:column; gap:8px; margin-bottom:14px; }
  .stop-card { background:#fff; border:2px solid var(--border); border-radius:var(--radius); padding:12px 14px; display:flex; align-items:flex-start; gap:12px; cursor:pointer; transition:all 0.15s; border-left:4px solid transparent; user-select:none; box-shadow:0 1px 4px rgba(0,0,0,0.06); }
  .stop-card:active { transform:scale(0.985); }
  .stop-card.selected { border-color:var(--accent); background:rgba(232,89,12,0.05); box-shadow:0 0 0 2px var(--accent); }
  .stop-card.priority { border-left-color:var(--gold); }
  .stop-card.selected.priority { border-color:var(--accent); border-left-color:var(--accent); }
  .stop-check { width:24px; height:24px; border-radius:50%; border:2.5px solid #7080a0; display:flex; align-items:center; justify-content:center; flex-shrink:0; transition:all 0.15s; font-size:13px; font-weight:900; margin-top:1px; }
  .stop-card.selected .stop-check { background:var(--accent); border-color:var(--accent); color:#fff; }
  .stop-body { flex:1; min-width:0; }
  .stop-name-row { display:flex; align-items:center; gap:5px; margin-bottom:2px; }
  .stop-name { font-size:15px; font-weight:700; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .stop-addr { font-size:11px; color:var(--muted); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; font-family:'DM Mono',monospace; margin-bottom:2px; }
  .stop-contact-line { font-size:11px; color:var(--muted); margin-bottom:2px; }
  .stop-notes-line { font-size:11px; color:var(--accent); font-style:italic; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; margin-bottom:4px; }
  .stop-meta { display:flex; align-items:center; gap:6px; flex-wrap:wrap; }
  .stop-visited { font-size:10px; color:var(--muted); font-family:'DM Mono',monospace; }
  .stop-actions { display:flex; flex-direction:column; align-items:flex-end; gap:5px; flex-shrink:0; }
  .contact-btns { display:flex; gap:4px; }
  .icon-btn { font-size:18px; background:none; border:none; cursor:pointer; padding:2px; line-height:1; text-decoration:none; display:inline-block; }
  .tag { font-size:10px; padding:2px 8px; border-radius:20px; border:1px solid; flex-shrink:0; }
  .tag-facility { color:#1d6fb8; border-color:#bdd6f0; background:#e8f2fb; }
  .tag-client { color:#6d3bbf; border-color:#d4bbf5; background:#f0e8fd; }
  .tag-office { color:#166534; border-color:#a7d9b8; background:#dcfce7; }
  .tag-other { color:#c2410c; border-color:#fbbf99; background:#fff0e6; }
  .day-tag { font-size:10px; padding:2px 8px; border-radius:20px; border:1px solid; flex-shrink:0; font-weight:700; }
  .day-mon { color:#0369a1; border-color:#7dd3fc; background:#e0f2fe; }
  .day-tue { color:#7c3aed; border-color:#c4b5fd; background:#f3f0ff; }
  .day-wed { color:#065f46; border-color:#6ee7b7; background:#d1fae5; }
  .day-thu { color:#b45309; border-color:#fcd34d; background:#fef9c3; }
  .day-fri { color:#be185d; border-color:#f9a8d4; background:#fce7f3; }
  .day-sat { color:#0f766e; border-color:#5eead4; background:#f0fdfa; }
  .day-none { color:#6b7280; border-color:#d1d5db; background:#f3f4f6; }
  .inactive-card { opacity:0.55; }
  .inactive-toggle { display:flex; align-items:center; justify-content:space-between; padding:10px 14px; background:#fff; border:2px solid var(--border); border-radius:8px; margin:10px 0; cursor:pointer; }
  .inactive-toggle-label { font-size:13px; font-weight:700; color:#3d4966; }
  .inactive-count { font-size:11px; font-weight:700; background:#fee2e2; color:#dc2626; border-radius:20px; padding:2px 8px; }
  .fab { position:fixed; bottom:24px; right:20px; z-index:150; display:flex; align-items:center; gap:8px; padding:16px 22px; background:#b84000; color:#fff; border:none; border-radius:50px; font-size:15px; font-weight:800; cursor:pointer; box-shadow:0 6px 24px rgba(140,50,0,0.55); transition:all 0.2s; letter-spacing:0.3px; }
  .fab:active { transform:scale(0.95); }
  .fab.hidden { transform:translateY(100px); opacity:0; pointer-events:none; }
  .fab-badge { background:#fff; color:#b84000; border-radius:50%; width:20px; height:20px; font-size:11px; font-weight:800; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
  .optimize-tip { display:flex; align-items:flex-start; gap:10px; background:#fffbeb; border:1px solid #fcd34d; border-radius:var(--radius); padding:12px 14px; margin-top:10px; }
  .optimize-tip-icon { font-size:18px; flex-shrink:0; }
  .optimize-tip-title { font-size:13px; font-weight:700; color:var(--gold); margin-bottom:2px; }
  .optimize-tip-sub { font-size:12px; color:#92400e; line-height:1.4; }
  .tip-close { background:none; border:none; color:#92400e; font-size:20px; cursor:pointer; padding:0 2px; line-height:1; flex-shrink:0; margin-left:auto; opacity:0.6; }
  .empty-state { text-align:center; padding:40px 20px; color:var(--muted); }
  .empty-icon { font-size:36px; margin-bottom:12px; }
  .empty-title { font-size:16px; font-weight:700; color:var(--text); margin-bottom:6px; }
  .empty-sub { font-size:13px; line-height:1.5; }
  .section-label { font-size:11px; font-weight:600; color:var(--muted); text-transform:uppercase; letter-spacing:1px; margin-bottom:10px; }
  .divider { display:flex; align-items:center; gap:10px; margin:8px 0 14px; color:var(--muted); font-size:11px; font-weight:600; letter-spacing:1px; text-transform:uppercase; }
  .divider::before,.divider::after { content:''; flex:1; height:1px; background:var(--border); }
  .add-form { background:#fff; border:2px solid var(--border); border-radius:var(--radius); padding:16px; margin-bottom:20px; box-shadow:0 2px 12px rgba(0,0,0,0.08); }
  .form-row { margin-bottom:10px; }
  .form-label { font-size:11px; font-weight:600; color:var(--muted); text-transform:uppercase; letter-spacing:0.8px; margin-bottom:5px; display:block; }
  .form-input { background:#fff; }
  .form-row-2 { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:10px; }
  .priority-toggle { display:flex; align-items:center; gap:8px; padding:10px 14px; background:#fff; border:2px solid var(--border); border-radius:8px; cursor:pointer; transition:all 0.15s; margin-bottom:10px; }
  .priority-toggle.on { background:#fef3c7; border-color:#fcd34d; }
  .priority-label { font-size:13px; font-weight:600; color:var(--muted); }
  .priority-toggle.on .priority-label { color:var(--gold); }
  .add-btn { width:100%; padding:16px; background:#e8590c; color:#fff; border:none; border-radius:8px; font-size:16px; font-weight:800; cursor:pointer; transition:all 0.15s; letter-spacing:0.3px; }
  .add-btn:hover { background:var(--accent2); }
  .saved-list { display:flex; flex-direction:column; gap:8px; }
  .saved-card { background:#fff; border:2px solid var(--border); border-radius:var(--radius); padding:13px 14px; border-left:4px solid transparent; box-shadow:0 1px 4px rgba(0,0,0,0.06); margin-bottom:2px; }
  .saved-card.priority-card { border-left-color:var(--gold); }
  .saved-card.inactive-card { opacity:0.55; }
  .saved-card-top { display:flex; align-items:flex-start; gap:10px; }
  .saved-num { font-family:'DM Mono',monospace; font-size:11px; color:var(--muted); min-width:20px; margin-top:2px; flex-shrink:0; }
  .saved-info { flex:1; min-width:0; }
  .saved-name-row { display:flex; align-items:center; gap:6px; margin-bottom:2px; }
  .saved-name { font-size:14px; font-weight:700; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .saved-addr { font-size:11px; color:var(--muted); font-family:'DM Mono',monospace; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; margin-bottom:2px; }
  .saved-contact { font-size:11px; color:var(--muted); margin-bottom:2px; }
  .saved-notes { font-size:11px; color:var(--accent); font-style:italic; margin-bottom:2px; }
  .saved-btns { display:flex; gap:5px; align-items:center; flex-shrink:0; flex-wrap:wrap; justify-content:flex-end; }
  .saved-tag { font-size:10px; padding:2px 8px; border-radius:20px; border:1px solid; }
  .edit-btn { background:#1a2040; border:none; border-radius:7px; padding:5px 10px; font-size:12px; font-weight:700; color:#fff; cursor:pointer; }
  .edit-btn:hover { background:var(--accent); }
  .deactivate-btn { background:#fee2e2; border:none; border-radius:7px; padding:5px 10px; font-size:12px; font-weight:700; color:#dc2626; cursor:pointer; }
  .restore-btn { background:#16a34a; border:none; border-radius:7px; padding:5px 10px; font-size:12px; font-weight:700; color:#fff; cursor:pointer; }
  .delete-btn { background:none; border:none; color:#8090b0; cursor:pointer; font-size:20px; padding:2px 4px; line-height:1; font-weight:900; }
  .delete-btn:hover { color:var(--red); }
  .saved-footer { display:flex; align-items:center; gap:8px; margin-top:8px; padding-top:8px; border-top:1px solid var(--border); }
  .visit-stat { font-size:10px; color:var(--muted); font-family:'DM Mono',monospace; }
  .modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.45); z-index:200; display:flex; align-items:flex-end; justify-content:center; }
  .modal-overlay.hidden { display:none; }
  .modal { background:#fff; border-radius:20px 20px 0 0; padding:20px 20px 40px; width:100%; max-width:480px; max-height:90vh; overflow-y:auto; }
  .modal-handle { width:40px; height:4px; background:var(--border); border-radius:2px; margin:0 auto 16px; }
  .modal-title { font-size:17px; font-weight:800; margin-bottom:16px; }
  .modal-footer { display:flex; gap:8px; margin-top:16px; }
  .modal-save { flex:1; padding:13px; background:var(--accent); color:#fff; border:none; border-radius:10px; font-size:15px; font-weight:700; cursor:pointer; }
  .modal-cancel { padding:13px 18px; background:var(--surface2); color:var(--muted); border:1px solid var(--border); border-radius:10px; font-size:15px; font-weight:700; cursor:pointer; }
  .toast { position:fixed; bottom:24px; left:50%; transform:translateX(-50%) translateY(80px); padding:10px 20px; border-radius:20px; font-size:13px; font-weight:700; transition:transform 0.3s; z-index:999; white-space:nowrap; color:#fff; pointer-events:none; }
  .toast.show { transform:translateX(-50%) translateY(0); }
</style>
</head>
<body>
<div id="root"></div>
<script>
// ── Icon ─────────────────────────────────────────────────────────────────────
(function(){
  var c=document.createElement('canvas'); c.width=180; c.height=180;
  var x=c.getContext('2d');
  var g=x.createLinearGradient(0,0,180,180); g.addColorStop(0,'#ff6a1a'); g.addColorStop(1,'#c44a00');
  x.fillStyle=g; x.beginPath(); x.moveTo(36,0); x.lineTo(144,0);
  x.quadraticCurveTo(180,0,180,36); x.lineTo(180,144);
  x.quadraticCurveTo(180,180,144,180); x.lineTo(36,180);
  x.quadraticCurveTo(0,180,0,144); x.lineTo(0,36); x.quadraticCurveTo(0,0,36,0); x.fill();
  x.fillStyle='rgba(255,255,255,0.15)'; x.beginPath(); x.arc(90,72,44,0,Math.PI*2); x.fill();
  x.strokeStyle='#fff'; x.lineWidth=9; x.lineCap='round';
  x.beginPath(); x.arc(90,68,22,0,Math.PI*2); x.stroke();
  x.beginPath(); x.moveTo(90,90); x.lineTo(90,116); x.stroke();
  x.fillStyle='#fff'; x.beginPath(); x.arc(90,68,8,0,Math.PI*2); x.fill();
  x.font='bold 26px sans-serif'; x.textAlign='center'; x.fillText('RouteGO',90,152);
  document.getElementById('appIcon').href=c.toDataURL('image/png');
})();

// ── Constants ─────────────────────────────────────────────────────────────────
var JSONBIN_BASE = ‘https://api.jsonbin.io/v3’;
var DAYS_OF_WEEK = [{key:‘mon’,label:‘Mon’},{key:‘tue’,label:‘Tue’},{key:‘wed’,label:‘Wed’},{key:‘thu’,label:‘Thu’},{key:‘fri’,label:‘Fri’},{key:‘sat’,label:‘Sat’}];
var DAY_COLORS = {mon:‘day-mon’,tue:‘day-tue’,wed:‘day-wed’,thu:‘day-thu’,fri:‘day-fri’,sat:‘day-sat’,none:‘day-none’};
var TAG_CLASS = {facility:‘tag-facility’,client:‘tag-client’,office:‘tag-office’,other:‘tag-other’};
var TAG_LABEL = {facility:‘Facility’,client:‘Client’,office:‘Office’,other:‘Other’};
var MONTHS = [‘Jan’,‘Feb’,‘Mar’,‘Apr’,‘May’,‘Jun’,‘Jul’,‘Aug’,‘Sep’,‘Oct’,‘Nov’,‘Dec’];
var WEEKDAYS = [‘Sun’,‘Mon’,‘Tue’,‘Wed’,‘Thu’,‘Fri’,‘Sat’];

// ── State ─────────────────────────────────────────────────────────────────────
var state = {
locations: JSON.parse(localStorage.getItem(‘rg_locations’) || ‘[]’),
selected: new Set(JSON.parse(localStorage.getItem(‘rg_selected’) || ‘[]’)),
tab: ‘today’,
filter: ‘’,
manageFilter: ‘’,
showInactive: false,
startAddr: ‘’,
showTip: false,
editLoc: null,
newData: blankLoc(),
apiKey: localStorage.getItem(‘rg_apikey’) || ‘’,
binId: localStorage.getItem(‘rg_binid’) || ‘’,
apiKeyInput: ‘’,
binIdInput: ‘’,
syncing: false,
syncStatus: ‘’,
syncError: false,
toast: {msg:’’,type:‘success’,visible:false},
toastTimer: null
};

function blankLoc() {
return {name:’’,address:’’,contact:’’,phone:’’,phone2:’’,category:‘facility’,notes:’’,priority:false,day:‘none’,inactive:false};
}

function setState(updates) {
Object.assign(state, updates);
render();
}

// ── Helpers ───────────────────────────────────────────────────────────────────
function formatPhone(val) {
var d = val.replace(/\D/g,’’).slice(0,10);
if (d.length <= 3) return d;
if (d.length <= 6) return ‘(’ + d.slice(0,3) + ‘) ’ + d.slice(3);
return ‘(’ + d.slice(0,3) + ‘) ’ + d.slice(3,6) + ‘-’ + d.slice(6);
}
function fmtDate(iso) {
if (!iso) return ‘’;
var d = new Date(iso);
return (d.getMonth()+1) + ‘/’ + d.getDate() + ‘/’ + String(d.getFullYear()).slice(2);
}
function fmtTime(d) {
var h=d.getHours(), m=d.getMinutes(), a=h>=12?‘pm’:‘am’;
h=h%12||12;
return h + ‘:’ + String(m).padStart(2,‘0’) + a;
}
function cleanPhone(p) { return p.replace(/\D/g,’’); }
function esc(s) { return String(s||’’).replace(/&/g,’&’).replace(/</g,’<’).replace(/>/g,’>’).replace(/”/g,’"’); }

function saveLocal() {
localStorage.setItem(‘rg_locations’, JSON.stringify(state.locations));
localStorage.setItem(‘rg_selected’, JSON.stringify([…state.selected]));
}

// ── Toast ─────────────────────────────────────────────────────────────────────
function showToast(msg, type) {
clearTimeout(state.toastTimer);
state.toast = {msg:msg, type:type||‘success’, visible:true};
state.toastTimer = setTimeout(function() {
state.toast.visible = false;
render();
}, 2500);
render();
}

function hideToast() {
clearTimeout(state.toastTimer);
state.toast.visible = false;
}

// ── Sync Status ───────────────────────────────────────────────────────────────
function setStatus(msg, isError) {
state.syncStatus = msg;
state.syncError = !!isError;
}

// ── Cloud ─────────────────────────────────────────────────────────────────────
async function pushCloud(locs, key, bid) {
if (!key) return bid;
try {
if (!bid) {
var res = await fetch(JSONBIN_BASE + ‘/b’, {
method:‘POST’,
headers:{‘Content-Type’:‘application/json’,‘X-Master-Key’:key,‘X-Bin-Name’:‘RouteGO’},
body: JSON.stringify({locations:locs})
});
if (!res.ok) throw new Error(res.status);
var data = await res.json();
var newBid = data.metadata.id;
localStorage.setItem(‘rg_binid’, newBid);
state.binId = newBid;
setStatus(‘Bin ID: ’ + newBid + ’ (use on 2nd phone)’);
return newBid;
} else {
var res2 = await fetch(JSONBIN_BASE + ‘/b/’ + bid, {
method:‘PUT’,
headers:{‘Content-Type’:‘application/json’,‘X-Master-Key’:key},
body: JSON.stringify({locations:locs})
});
if (!res2.ok) throw new Error(res2.status);
setStatus(’Synced ’ + fmtTime(new Date()));
return bid;
}
} catch(e) {
setStatus(‘Sync failed — check API key’, true);
return bid;
}
}

async function pullCloud(key, bid, silent) {
if (!key || !bid) return false;
state.syncing = true;
render();
try {
var res = await fetch(JSONBIN_BASE + ‘/b/’ + bid + ‘/latest’, {headers:{‘X-Master-Key’:key}});
if (!res.ok) throw new Error(res.status);
var data = await res.json();
state.locations = data.record.locations || [];
saveLocal();
setStatus(’Synced ’ + fmtTime(new Date()));
if (!silent) showToast(‘Locations synced’);
return true;
} catch(e) {
setStatus(‘Sync failed — check API key’, true);
if (!silent) showToast(‘Sync failed’, ‘error’);
return false;
} finally {
state.syncing = false;
render();
}
}

async function saveAndSync(newLocs) {
state.locations = newLocs;
saveLocal();
render();
await pushCloud(newLocs, state.apiKey, state.binId);
render();
}

// ── Connect ───────────────────────────────────────────────────────────────────
async function handleConnect() {
var key = state.apiKeyInput.trim();
if (!key) { showToast(‘Please enter an API key’, ‘error’); return; }
localStorage.setItem(‘rg_apikey’, key);
state.apiKey = key;
var newBid = state.binIdInput.trim();
if (newBid) { localStorage.setItem(‘rg_binid’, newBid); state.binId = newBid; }
showToast(‘Connecting…’);
var pulled = await pullCloud(key, state.binId, true);
if (!pulled) await pushCloud(state.locations, key, state.binId);
render();
}

function handleReset() {
if (!confirm(‘Reset sync credentials? Your cloud data is NOT deleted.’)) return;
state.apiKey = ‘’; state.binId = ‘’;
localStorage.removeItem(‘rg_apikey’); localStorage.removeItem(‘rg_binid’);
setStatus(‘Not connected — enter API key above’);
showToast(‘Credentials cleared’);
}

async function addLocation() {
var d = state.newData;
if (!d.name.trim() || !d.address.trim()) { showToast(‘Name and address required’, ‘error’); return; }
var loc = Object.assign({}, d, {id: Date.now().toString(), visitCount:0, lastVisit:null});
await saveAndSync(state.locations.concat([loc]));
state.newData = blankLoc();
showToast(loc.name + ’ added!’);
}

async function deleteLocation(id) {
if (!confirm(‘Remove this location?’)) return;
state.selected.delete(id);
await saveAndSync(state.locations.filter(function(l){return l.id !== id;}));
showToast(‘Location removed’);
}

async function toggleInactive(id) {
var loc = state.locations.find(function(l){return l.id===id;});
if (!loc) return;
var wasInactive = loc.inactive;
await saveAndSync(state.locations.map(function(l){
return l.id===id ? Object.assign({},l,{inactive:!l.inactive}) : l;
}));
showToast(wasInactive ? loc.name + ’ restored!’ : loc.name + ’ set to inactive’);
}

async function saveEdit(data) {
var updated = Object.assign({}, data, {day: data.day || ‘none’});
state.editLoc = null;
render();
await saveAndSync(state.locations.map(function(l){
return l.id===updated.id ? Object.assign({},l,updated) : l;
}));
showToast(updated.name + ’ updated!’);
}

// ── Launch Route ──────────────────────────────────────────────────────────────
function buildAndLaunch(lat, lng) {
var stops = state.locations.filter(function(l){return !l.inactive && state.selected.has(l.id);});
var encoded = stops.map(function(l){return encodeURIComponent(l.address);});
var allStops;
if (state.startAddr) allStops = [encodeURIComponent(state.startAddr)].concat(encoded);
else if (lat && lng) allStops = [lat+’,’+lng].concat(encoded);
else allStops = encoded.slice();
var url = ‘googlechrome://maps.google.com/maps/dir/’ + allStops.join(’/’);
window.location.href = url;
showToast(‘Opening ’ + stops.length + ’ stop’ + (stops.length>1?‘s’:’’) + ’ in Maps’);
if (stops.length > 1) { state.showTip = true; render(); }
}

function launchRoute() {
var stops = state.locations.filter(function(l){return !l.inactive && state.selected.has(l.id);});
if (stops.length === 0) return;
if (!state.startAddr && navigator.geolocation) {
showToast(‘Getting your location…’);
navigator.geolocation.getCurrentPosition(
function(pos){ buildAndLaunch(pos.coords.latitude, pos.coords.longitude); },
function(){ buildAndLaunch(null, null); },
{timeout:5000, maximumAge:30000}
);
} else {
buildAndLaunch(null, null);
}
}

// ── Derived ───────────────────────────────────────────────────────────────────
function getDerived() {
var todayKey = [‘sun’,‘mon’,‘tue’,‘wed’,‘thu’,‘fri’,‘sat’][new Date().getDay()];
var allSorted = state.locations.slice().sort(function(a,b){
var aT = a.day===todayKey?0:1, bT = b.day===todayKey?0:1;
if (aT!==bT) return aT-bT;
return a.name.localeCompare(b.name);
});
var active = allSorted.filter(function(l){return !l.inactive;});
var inactive = allSorted.filter(function(l){return l.inactive;});
var f = state.filter.toLowerCase();
var mf = state.manageFilter.toLowerCase();
var filtered = active.filter(function(l){
if (!f) return true;
return l.name.toLowerCase().includes(f) || l.address.toLowerCase().includes(f) ||
(l.contact||’’).toLowerCase().includes(f);
});
var manageSorted = active.filter(function(l){
if (!mf) return true;
return l.name.toLowerCase().includes(mf) || l.address.toLowerCase().includes(mf) ||
(l.contact||’’).toLowerCase().includes(mf) || (l.category||’’).toLowerCase().includes(mf) ||
(l.day||’’).toLowerCase().includes(mf);
});
var inactiveFiltered = inactive.filter(function(l){
if (!mf) return true;
return l.name.toLowerCase().includes(mf) || l.address.toLowerCase().includes(mf) ||
(l.contact||’’).toLowerCase().includes(mf);
});
return {active:active, inactive:inactive, filtered:filtered, manageSorted:manageSorted, inactiveFiltered:inactiveFiltered};
}
